<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/cs16.min.css" />
    <link rel="stylesheet" href="/src/index.css" />
    <link rel="stylesheet" href="/src/mail-app.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>cs16 Mail Client</title>
  </head>
  <body class="mail-app">
    <!-- App Shell Header -->
    <header class="app-header">
      <div class="app-header-top">
        <h1 class="app-title">MAILBOX</h1>
        <div class="header-actions">
          <button class="cs-btn" id="new-message-btn">New Message</button>
        </div>
      </div>
      <hr class="cs-hr" />
    </header>

    <!-- Main Three-Pane Layout -->
    <div class="app-container">
      <!-- Left Sidebar - Folder Navigation -->
      <aside class="sidebar gutter">
        <div class="sidebar-header">
          <h3>FOLDERS</h3>
        </div>
        <nav class="folder-nav" id="folder-nav">
          <!-- Folders rendered by VanJS -->
        </nav>
        <hr class="cs-hr" />
        <div class="sidebar-footer">
          <button class="cs-btn" id="settings-btn">Settings</button>
        </div>
      </aside>

      <!-- Middle Pane - Message List -->
      <section class="message-list-pane gutter">
        <div class="list-header">
          <h3 id="current-folder-title">Inbox</h3>
          <div class="list-toolbar">
            <input type="text" class="cs-input" id="search-input" placeholder="Search..." />
          </div>
        </div>
        <hr class="cs-hr" />
        <div class="message-list" id="message-list">
          <!-- Messages rendered by VanJS -->
        </div>
      </section>

      <!-- Right Pane - Reading Pane -->
      <section class="reading-pane gutter">
        <div class="reading-pane-content" id="reading-pane">
          <div class="no-selection">
            <p>Select a message to read</p>
          </div>
        </div>
      </section>
    </div>

    <!-- Compose Dialog -->
    <dialog class="cs-dialog" id="compose-dialog">
      <form method="dialog">
        <div class="heading">
          <div class="wrapper">
            <div class="icon"></div>
            <p class="text">New Message</p>
          </div>
          <button class="cs-btn close"></button>
        </div>
        <div class="content">
          <div class="compose-fields">
            <div class="field-group">
              <label class="cs-input__label" for="compose-to">To:</label>
              <input type="text" class="cs-input" id="compose-to" />
            </div>
            <div class="field-group">
              <label class="cs-input__label" for="compose-cc">Cc:</label>
              <input type="text" class="cs-input" id="compose-cc" />
            </div>
            <div class="field-group">
              <label class="cs-input__label" for="compose-bcc">Bcc:</label>
              <input type="text" class="cs-input" id="compose-bcc" />
            </div>
            <div class="field-group">
              <label class="cs-input__label" for="compose-subject">Subject:</label>
              <input type="text" class="cs-input" id="compose-subject" />
            </div>
            <div class="field-group">
              <label class="cs-input__label">Message:</label>
              <div id="compose-editor"></div>
            </div>
          </div>
        </div>
        <menu class="footer-btns">
          <button type="button" class="cs-btn" id="compose-send">Send</button>
          <button type="button" class="cs-btn" onclick="this.closest('dialog').close()">Discard</button>
        </menu>
      </form>
    </dialog>

    <!-- Move/Label Dialog -->
    <dialog class="cs-dialog" id="move-dialog">
      <form method="dialog">
        <div class="heading">
          <div class="wrapper">
            <div class="icon"></div>
            <p class="text">Move to Folder</p>
          </div>
          <button class="cs-btn close"></button>
        </div>
        <div class="content">
          <div id="folder-picker"></div>
        </div>
        <menu class="footer-btns">
          <button type="button" class="cs-btn">Move</button>
          <button type="button" class="cs-btn" onclick="this.closest('dialog').close()">Cancel</button>
        </menu>
      </form>
    </dialog>

    <!-- Settings Dialog -->
    <dialog class="cs-dialog" id="settings-dialog">
      <form method="dialog">
        <div class="heading">
          <div class="wrapper">
            <div class="icon"></div>
            <p class="text">Settings</p>
          </div>
          <button class="cs-btn close"></button>
        </div>
        <div class="content">
          <div class="cs-tabs">
            <input class="radiotab" name="settings-tabs" type="radio" id="settings-general" checked="checked" />
            <label class="label" for="settings-general">General</label>
            <div class="panel">
              <fieldset class="cs-fieldset">
                <legend>Preferences</legend>
                <div class="radio-wrapper">
                  <input type="checkbox" id="auto-archive" />
                  <label for="auto-archive">Auto-archive after reading</label>
                </div>
                <div class="radio-wrapper">
                  <input type="checkbox" id="show-preview" checked />
                  <label for="show-preview">Show message preview</label>
                </div>
              </fieldset>
            </div>
            <input class="radiotab" name="settings-tabs" type="radio" id="settings-accounts" />
            <label class="label" for="settings-accounts">Accounts</label>
            <div class="panel">
              <p>Manage accounts here</p>
            </div>
            <input class="radiotab" name="settings-tabs" type="radio" id="settings-filters" />
            <label class="label" for="settings-filters">Filters</label>
            <div class="panel">
              <p>Configure filter rules here</p>
            </div>
          </div>
        </div>
        <menu class="footer-btns">
          <button type="button" class="cs-btn" onclick="this.closest('dialog').close()">Close</button>
        </menu>
      </form>
    </dialog>

    <!-- Progress Bar for uploads/downloads -->
    <div class="transmission-progress" id="transmission-progress" style="display: none;">
      <div class="cs-progress-bar">
        <div class="bars" id="progress-bars" style="width: 0%"></div>
      </div>
    </div>

    <script type="module" src="./src/mail-app.js"></script>
  </body>
</html>
