# Deploy the pre-built component catalog to GitHub Pages.
#
# The build step (pnpm + vite) is done LOCALLY and the resulting dist/ is
# committed to the repo. This workflow only uploads the already-built files
# and asks Pages to serve them. Every Node/pnpm/corepack attempt in CI was
# flaky, and the user has been stuck on a 404 for 24+ hours — keeping the
# surface area tiny here so deploys can't silently no-op.
#
# Triggers:
#   - push to main                 — auto-deploy on every merge
#   - workflow_dispatch            — manual run (Actions tab / gh CLI / API)
#   - repository_dispatch          — external API trigger (POST /dispatches
#                                    with event_type: "deploy-pages")
#
# API trigger example:
#   curl -X POST \
#     -H "Authorization: Bearer $GITHUB_TOKEN" \
#     -H "Accept: application/vnd.github+json" \
#     https://api.github.com/repos/maceip/cs16.css/dispatches \
#     -d '{"event_type":"deploy-pages"}'

name: Deploy catalog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-pages, deploy-catalog]

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy dist/ to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dist/ exists
        run: |
          echo "--- dist tree ---"
          ls -la dist
          echo
          echo "--- dist/index.html head ---"
          head -20 dist/index.html
          test -s dist/index.html || { echo "ERROR: dist/index.html missing or empty — run the local build and commit dist/"; exit 1; }

      - name: Configure Pages
        # enablement: true flips Pages ON at the repo level on the very first
        # successful run. Safe to leave true after Pages is already enabled.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- page_url: ${{ steps.deploy.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- sha:      ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
