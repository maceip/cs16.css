# Deploy the component catalog (showcase + liar gallery + server browser) to
# GitHub Pages.
#
# Triggers:
#   - push to main                 — auto-deploy on every merge
#   - workflow_dispatch            — manual run (Actions tab / gh CLI / API)
#   - repository_dispatch          — external API trigger (POST /dispatches
#                                    with event_type: "deploy-pages")
#
# To fire from the API:
#   curl -X POST \
#     -H "Authorization: Bearer $GITHUB_TOKEN" \
#     -H "Accept: application/vnd.github+json" \
#     https://api.github.com/repos/maceip/cs16.css/dispatches \
#     -d '{"event_type":"deploy-pages"}'

name: Deploy catalog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to deploy
        required: false
        default: main
  repository_dispatch:
    types: [deploy-pages, deploy-catalog]

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || github.ref }}

      - name: Identify build target
        run: |
          echo "ref:    ${{ github.ref }}"
          echo "sha:    ${{ github.sha }}"
          echo "event:  ${{ github.event_name }}"
          git log -1 --oneline

      - name: Setup Node.js
        # Use Node's built-in corepack to activate the pnpm version pinned
        # in package.json's "packageManager" field. This sidesteps
        # pnpm/action-setup which was failing silently on every prior run
        # due to a version conflict with the +sha512 integrity hash.
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.3 --activate
          pnpm --version

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build CSS
        run: pnpm run build:css

      - name: Build catalog (vite)
        run: pnpm exec vite build --base=./

      - name: Verify build output
        run: |
          echo "--- dist tree ---"
          ls -la dist
          echo
          echo "--- dist/index.html head ---"
          head -20 dist/index.html
          test -s dist/index.html || { echo "dist/index.html missing or empty"; exit 1; }

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- page_url: ${{ steps.deploy.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- sha:      ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
